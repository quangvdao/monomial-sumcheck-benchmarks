# Benchmarking repo: we know the target CPU at build time, so compile
# for it directly. This unlocks binius-field's SIMD code paths for
# GF(2^128) on x86_64:
#
#   baseline x86_64           -> portable u128 scalar multiply
#   +pclmulqdq                -> arch/x86_64/packed_ghash_128 (PCLMULQDQ)
#   +vpclmulqdq +avx2         -> arch/x86_64/packed_ghash_256 (VPCLMULQDQ 256-bit)
#   +vpclmulqdq +avx512f      -> arch/x86_64/packed_ghash_512 (VPCLMULQDQ 512-bit)
#
# `target-cpu=native` picks whichever is best for the build host.
#
# We explicitly disable `avx512f` because `hachi-pcs` (our Fp128
# arith source) gates a `#![feature(stdarch_x86_avx512)]` opt-in
# behind that target feature, and `feature(...)` is forbidden on
# the stable channel even when the underlying intrinsics have
# stabilized. With `-avx512f`, hachi compiles fine and we still
# get binius's `packed_ghash_256` path (2x 128-bit carryless mul
# per VPCLMULQDQ op, which is ~5-7x faster than scalar u128 mul).
#
# aarch64 (M4 Max dev box) already has NEON `pmull` in the baseline
# target, so the override is a no-op there.

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native", "-C", "target-feature=-avx512f"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native", "-C", "target-feature=-avx512f"]
